<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>lifesync-frontend</title>
    <script>
      (function() {
        try {
          var s = localStorage.getItem('lifesync-theme');
          var t = s ? JSON.parse(s).state.theme : null;
          var d = !t && window.matchMedia('(prefers-color-scheme: dark)').matches;
          if (t === 'dark' || d) document.documentElement.classList.add('dark');
          var l = localStorage.getItem('lifesync-locale');
          if (l === 'en' || l === 'ru') { document.documentElement.lang = l; }
          else { document.documentElement.lang = (navigator.language || '').startsWith('ru') ? 'ru' : 'en'; }
        } catch(e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
